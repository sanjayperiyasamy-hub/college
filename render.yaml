services:
  # Unified Fullstack Service
  - type: web
    name: college-platform
    runtime: node
    buildCommand: npm install && npm run build --prefix client && npm run build --prefix server
    startCommand: npm start --prefix server
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: file:./dev.db
      - key: VITE_API_BASE
        value: "" # Empty means use relative paths
